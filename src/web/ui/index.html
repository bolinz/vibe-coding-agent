<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Coding Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #1a4a7a; }

    .layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ========== HEADER ========== */
    .header {
      background: linear-gradient(135deg, #16213e, #1a1a3e);
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
    }
    .header h1 {
      font-size: 1.1rem;
      color: #00d9ff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .conn-dot {
      font-size: 0.7rem;
      margin-left: 0.2rem;
      transition: color 0.3s;
    }
    .conn-on { color: #4caf50; }
    .conn-ws { color: #ff9800; }
    .conn-off { color: #f44336; }

    .nav-buttons { display: flex; gap: 0.25rem; }

    .nav-btn {
      background: transparent;
      border: none;
      color: #666;
      padding: 0.35rem 0.7rem;
      border-radius: 0.4rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      position: relative;
    }
    .nav-btn:hover {
      color: #aaa;
      background: rgba(255,255,255,0.05);
    }
    .nav-btn.active {
      color: #00d9ff;
      background: rgba(0,217,255,0.08);
    }
    .nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: #00d9ff;
      border-radius: 1px;
    }

    #sidebarToggle {
      display: none;
      background: transparent;
      border: none;
      color: #aaa;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 0.3rem;
    }
    #sidebarToggle:hover { color: #00d9ff; background: rgba(0,217,255,0.1); }

    /* ========== VIEWS ========== */
    .view {
      flex: 1;
      overflow-y: auto;
      display: none;
    }
    .view.active { display: flex; flex-direction: column; }

    /* ========== SIDEBAR ========== */
    .sidebar {
      width: 280px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: margin-left 0.25s ease, opacity 0.2s ease;
    }
    .sidebar.collapsed {
      margin-left: -280px;
      opacity: 0;
      pointer-events: none;
    }
    .sidebar-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header h3 {
      font-size: 0.85rem;
      color: #aaa;
    }
    .sidebar-header button {
      background: #00d9ff;
      border: none;
      color: #1a1a2e;
      width: 26px;
      height: 26px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }
    .sidebar-header button:hover { background: #00b8d9; transform: scale(1.1); }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem;
    }
    .session-item {
      padding: 0.6rem 0.7rem;
      border-radius: 0.5rem;
      cursor: pointer;
      margin-bottom: 0.3rem;
      transition: all 0.15s;
      border-left: 3px solid transparent;
      position: relative;
    }
    .session-item:hover {
      background: rgba(0, 217, 255, 0.05);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .session-item.active {
      background: rgba(0, 217, 255, 0.1);
      border-left-color: #00d9ff;
      box-shadow: 0 1px 6px rgba(0,217,255,0.08);
    }
    .session-item .session-name {
      font-size: 0.8rem;
      color: #eee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 20px;
    }
    .session-item .session-channels {
      font-size: 0.65rem;
      margin-left: 0.3rem;
    }
    .session-item .session-meta {
      font-size: 0.65rem;
      color: #666;
      margin-top: 0.15rem;
    }
    .session-item.pinned { border-left-color: #ffc107; }
    .session-item .session-pin {
      position: absolute;
      bottom: 0.6rem;
      right: 0.4rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.2rem 0.3rem;
      border-radius: 3px;
      z-index: 1;
      transition: transform 0.2s, background 0.15s;
    }
    .session-item .session-pin:hover { background: rgba(255, 193, 7, 0.2); transform: scale(1.15); }
    .session-item .session-agent {
      font-size: 0.6rem;
      margin-top: 0.25rem;
      background: #1a1a2e;
      color: #aaa;
      border: 1px solid #0f3460;
      border-radius: 3px;
      padding: 0.12rem 0.3rem;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.15s;
    }
    .session-item .session-agent:hover { border-color: #00d9ff; }
    .session-item .session-del {
      position: absolute;
      top: 0.3rem;
      right: 0.3rem;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.15rem 0.35rem;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
      border-radius: 3px;
    }
    .session-item:hover .session-del { opacity: 1; }
    .session-item .session-del:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ========== WELCOME PAGE ========== */
    .welcome-page {
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .welcome-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 1rem;
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .welcome-card .icon { font-size: 3rem; margin-bottom: 1rem; }
    .welcome-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #00d9ff;
    }
    .welcome-card p.desc {
      color: #aaa;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .welcome-card .features {
      text-align: left;
      background: #1a1a2e;
      border-radius: 0.5rem;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      color: #ccc;
    }
    .welcome-card .features li {
      margin: 0.4rem 0;
      list-style: none;
    }
    .welcome-card .features li::before {
      content: "\2713 ";
      color: #00d9ff;
    }

    .quick-config {
      text-align: left;
      margin-bottom: 1.5rem;
    }
    .quick-config label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.25rem;
      margin-top: 0.75rem;
    }
    .quick-config input, .quick-config select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 0.4rem;
      color: #eee;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .quick-config input:focus, .quick-config select:focus {
      outline: none;
      border-color: #00d9ff;
      box-shadow: 0 0 0 3px rgba(0,217,255,0.15);
    }

    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #00b8d9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      width: 100%;
      padding: 0.6rem;
      background: transparent;
      color: #aaa;
      border: 1px solid #0f3460;
      border-radius: 0.5rem;
      margin-top: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { color: #eee; border-color: #666; }

    /* ========== CHAT ========== */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      scroll-behavior: smooth;
    }
    .message {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      animation: msgIn 0.2s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      background: linear-gradient(135deg, #0f3460, #0f3a6a);
      align-self: flex-end;
      border-bottom-right-radius: 0.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .message.assistant {
      background: linear-gradient(135deg, #16213e, #1a1a3e);
      align-self: flex-start;
      border-bottom-left-radius: 0.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .message.system {
      background: transparent;
      color: #666;
      font-size: 0.85rem;
      align-self: center;
      text-align: center;
    }
    .message.error {
      background: #4a1a1a;
      color: #ff6b6b;
      align-self: flex-start;
    }
    .typing {
      display: flex;
      gap: 0.3rem;
      padding: 0.7rem 1rem;
      align-items: center;
      animation: msgIn 0.2s ease;
    }
    .typing .typing-dots {
      display: flex;
      gap: 0.3rem;
      align-items: center;
    }
    .typing .typing-dots span {
      width: 8px;
      height: 8px;
      background: #00d9ff;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .typing .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    .typing-status {
      font-size: 0.75rem;
      color: #00d9ff;
      margin-left: 0.5rem;
    }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* ========== SCROLL TO BOTTOM ========== */
    #scrollBottomBtn {
      position: absolute;
      bottom: 0.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #16213e;
      border: 1px solid #0f3460;
      color: #aaa;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 10;
    }
    #scrollBottomBtn:hover {
      background: #1a1a3e;
      color: #00d9ff;
      border-color: #00d9ff;
    }
    #scrollBottomBtn.visible { display: flex; }

    /* ========== INPUT AREA ========== */
    .input-area {
      padding: 0.75rem 1rem;
      background: #16213e;
      border-top: 1px solid #0f3460;
      position: relative;
    }
    .input-container {
      display: flex;
      gap: 0.5rem;
      max-width: 800px;
      margin: 0 auto;
      align-items: center;
    }
    .input-container input {
      flex: 1;
      padding: 0.7rem 1rem;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 0.5rem;
      color: #eee;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-container input:focus {
      outline: none;
      border-color: #00d9ff;
      box-shadow: 0 0 0 3px rgba(0,217,255,0.1);
    }
    .input-container button {
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    #sendBtn {
      background: #00d9ff;
      color: #1a1a2e;
      padding: 0.7rem 1.2rem;
      border-radius: 0.5rem;
    }
    #sendBtn:hover:not(:disabled) { background: #00b8d9; }
    #sendBtn:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }
    #sendBtn.loading {
      background: #0f3460;
      color: #00d9ff;
    }
    #cancelBtn {
      background: rgba(244,67,54,0.15);
      color: #ff6b6b;
      padding: 0.7rem 0.7rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
    }
    #cancelBtn:hover { background: rgba(244,67,54,0.25); }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #16213e;
      border: 1px solid #0f3460;
      color: #eee;
      padding: 0.6rem 1.2rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      z-index: 200;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast-undo {
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      padding: 0.2rem 0.5rem;
      border-radius: 0.3rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      pointer-events: auto;
      transition: background 0.15s;
    }
    .toast-undo:hover { background: #00b8d9; }

    /* ========== CONFIG PAGE ========== */
    .config-page {
      padding: 1.5rem 2rem;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }
    .config-section { margin-bottom: 2rem; }
    .config-section h3 {
      font-size: 1rem;
      color: #00d9ff;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #0f3460;
    }
    .config-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      padding: 0.5rem 0;
    }
    .config-row label {
      width: 160px;
      font-size: 0.9rem;
      color: #ccc;
      flex-shrink: 0;
    }
    .config-row .desc {
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.15rem;
    }
    .config-row input, .config-row select {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 0.4rem;
      color: #eee;
      font-size: 0.9rem;
    }
    .config-row input:focus, .config-row select:focus {
      outline: none;
      border-color: #00d9ff;
    }
    .config-row input[type="password"] { font-family: monospace; }
    .config-row .toggle-vis {
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.25rem;
    }
    .config-row .toggle-vis:hover { color: #00d9ff; }
    .config-row .restart-tag {
      font-size: 0.7rem;
      color: #ff9f43;
      background: rgba(255, 159, 67, 0.15);
      padding: 0.1rem 0.4rem;
      border-radius: 0.2rem;
      margin-left: 0.5rem;
    }
    .config-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #0f3460;
    }
    .config-actions button {
      padding: 0.6rem 1.2rem;
      border-radius: 0.4rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-save { background: #00d9ff; color: #1a1a2e; }
    .btn-save:hover { background: #00b8d9; }
    .btn-reset { background: transparent; color: #aaa; border: 1px solid #0f3460; }
    .btn-reset:hover { border-color: #ff6b6b; color: #ff6b6b; }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .sidebar { width: 240px; }
      .sidebar.collapsed { margin-left: -240px; }
      #sidebarToggle { display: inline-flex; }
      .header h1 { font-size: 0.95rem; }
      .message { max-width: 90%; }
      .config-page { padding: 1rem; }
      .config-row { flex-direction: column; align-items: stretch; gap: 0.3rem; }
      .config-row label { width: auto; }
      .welcome-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
    <div class="header">
      <h1>
        <button id="sidebarToggle" title="切换侧栏">☰</button>
        <span>🤖</span> AI Coding Agent <span id="connStatus" class="conn-dot conn-off" title="未连接">●</span>
      </h1>
      <div class="nav-buttons">
        <button class="nav-btn" data-view="welcome" title="欢迎">❓</button>
        <button class="nav-btn active" data-view="chat" title="聊天">💬</button>
        <button class="nav-btn" data-view="config" title="设置">⚙️</button>
      </div>
    </div>

  <div class="view welcome-page" id="view-welcome">
    <div class="welcome-card">
      <div class="icon">🤖</div>
      <h2>AI Coding Agent</h2>
      <p class="desc">基于 TypeScript/Bun 的多渠道 AI Agent 共享会话框架</p>
      <ul class="features">
        <li>飞书 Bot 实时接入</li>
        <li>Web 实时聊天界面 (SSE + WebSocket)</li>
        <li>SSH 终端接入</li>
        <li>多 Agent 可插拔 (Hermes / Claude / Aider / Echo)</li>
        <li>工具链调用 (Shell / Git / File)</li>
        <li>会话管理 (创建/切换/关闭)</li>
      </ul>
      <div class="quick-config">
        <label>OpenAI API Key</label>
        <input type="password" id="wc-openai-key" placeholder="sk-...">
        <label>Anthropic API Key</label>
        <input type="password" id="wc-anthropic-key" placeholder="sk-...">
        <label>默认 Agent</label>
        <select id="wc-default-agent">
          <option value="echo">Echo（测试模式）</option>
          <option value="opencode">OpenCode（通用编码）</option>
          <option value="hermes">Hermes（本地推理）</option>
          <option value="claude">Claude（Anthropic）</option>
          <option value="aider">Aider（编码助手）</option>
        </select>
      </div>
      <button class="btn-primary" id="wc-save">保存并开始使用</button>
      <button class="btn-secondary" id="wc-skip">跳过配置，使用 Echo 测试模式</button>
    </div>
  </div>

  <div class="view chat-page active" id="view-chat">
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-header">
          <h3>📋 会话</h3>
          <button id="newSessionBtn" title="新建会话">+</button>
        </div>
        <div class="session-list" id="sessionList"></div>
      </div>
      <div class="chat-area">
        <div class="chat-container" id="chat"></div>
        <button id="scrollBottomBtn" title="滚动到底部">↓</button>
        <div class="input-area">
          <div class="input-container">
            <button id="cancelBtn" style="display:none" title="取消当前请求">⏹</button>
            <input type="text" id="messageInput" placeholder="输入消息... (Enter 发送)" autocomplete="off">
            <button id="sendBtn">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="view config-page" id="view-config">
    <div id="config-form"></div>
    <div class="config-actions">
      <button class="btn-save" id="cfg-save">💾 保存配置</button>
      <button class="btn-reset" id="cfg-reset">🔄 重置为默认</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ==================== CONSTANTS ====================
    const API = '/api';
    const AGENTS = ['echo', 'opencode', 'hermes', 'claude', 'codex', 'cline', 'aider'];

    // ==================== STATE ====================
    const state = {
      currentSessionId: localStorage.getItem('sessionId') || null,
      sse: null,
      wsFallback: null,
      useSSE: true,
      cachedSessions: [],
      lastSessionsFetch: 0,
      sessionsFetching: false,
      sending: false,
      reconnectDelay: 1000,
      sidebarOpen: true,
    };

    const USER_ID = localStorage.getItem('userId') ||
      (crypto.randomUUID ? crypto.randomUUID() : 'user_' + Math.random().toString(36).substring(2, 8));
    localStorage.setItem('userId', USER_ID);

    // ==================== DOM REFS ====================
    const $ = (id) => document.getElementById(id);
    const chat = $('chat');
    const input = $('messageInput');
    const sendBtn = $('sendBtn');
    const cancelBtn = $('cancelBtn');
    const sessionList = $('sessionList');
    const connDot = $('connStatus');
    const toastEl = $('toast');
    const scrollBtn = $('scrollBottomBtn');

    // ==================== ROUTING ====================
    function showView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      $('view-' + name).classList.add('active');
      document.querySelector('.nav-btn[data-view="' + name + '"]').classList.add('active');
      location.hash = '#/' + name;
      if (name === 'chat') setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => showView(btn.dataset.view));
    });

    if (!localStorage.getItem('vibe_agent_visited')) {
      showView('welcome');
    } else {
      const hash = location.hash.replace('#/', '') || 'chat';
      showView(hash === 'welcome' ? 'welcome' : hash === 'config' ? 'config' : 'chat');
    }

    // ==================== TOAST ====================
    let toastTimer = null;
    function toast(msg, duration = 2500) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    function toastWithUndo(msg, onUndo) {
      toastEl.innerHTML = msg + ' <button class="toast-undo">撤销</button>';
      toastEl.classList.add('show');
      const undoBtn = toastEl.querySelector('.toast-undo');
      undoBtn.addEventListener('click', () => {
        toastEl.classList.remove('show');
        onUndo();
      }, { once: true });
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
    }

    function hideToast() {
      toastEl.classList.remove('show');
      clearTimeout(toastTimer);
    }

    function errToast(err) {
      toast('错误: ' + (err.message || err), 4000);
    }

    // ==================== API ====================
    async function apiGet(path) {
      const res = await fetch(API + path);
      if (!res.ok) throw new Error('GET ' + path + ' failed: ' + res.status);
      return res.json();
    }
    async function apiPost(path, body) {
      const res = await fetch(API + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error('POST ' + path + ' failed: ' + res.status);
      return res.json();
    }
    async function apiDelete(path) {
      const res = await fetch(API + path, { method: 'DELETE' });
      if (!res.ok) throw new Error('DELETE ' + path + ' failed: ' + res.status);
      return res.json();
    }

    // ==================== CONNECTION STATUS ====================
    function updateConnStatus() {
      if (!connDot) return;
      if (state.sse && state.sse.readyState === EventSource.OPEN) {
        connDot.className = 'conn-dot conn-on';
        connDot.title = 'SSE 已连接';
      } else if (state.wsFallback && state.wsFallback.readyState === WebSocket.OPEN) {
        connDot.className = 'conn-dot conn-ws';
        connDot.title = 'WebSocket 已连接';
      } else {
        connDot.className = 'conn-dot conn-off';
        connDot.title = '未连接';
      }
    }

    // ==================== SESSION LIST ====================
    async function loadSessions(force) {
      const now = Date.now();
      if (!force && state.cachedSessions.length > 0 && now - state.lastSessionsFetch < 5000) {
        return state.cachedSessions;
      }
      if (state.sessionsFetching) return state.cachedSessions;
      state.sessionsFetching = true;
      try {
        const data = await apiGet('/sessions');
        state.cachedSessions = data.sessions || [];
        state.lastSessionsFetch = now;
        return state.cachedSessions;
      } catch (e) {
        console.warn('loadSessions failed:', e);
        return state.cachedSessions;
      } finally {
        state.sessionsFetching = false;
      }
    }

    function renderSessionList() {
      if (!sessionList) return;
      loadSessions().then(sessions => {
        sessions.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
        sessionList.innerHTML = sessions.map(s => {
          const active = s.id === state.currentSessionId ? 'active' : '';
          const pinned = s.pinned ? 'pinned' : '';
          const channels = (s.participants || []).map(p => {
            if (p.channel === 'feishu') return '\ud83d\udcf1';
            if (p.channel === 'websocket') return '\ud83c\udf10';
            if (p.channel === 'ssh') return '\ud83d\udcbb';
            return '';
          }).join(' ');
          return '<div class="session-item ' + active + ' ' + pinned + '" data-id="' + s.id + '">' +
            '<button class="session-del" data-id="' + s.id + '" title="关闭会话">\u00d7</button>' +
            '<div class="session-name">' + (s.pinned ? '\ud83d\udccc ' : '') + s.agentType + ' ' + s.id.slice(0, 8) + ' <span class="session-channels">' + channels + '</span></div>' +
            '<div class="session-meta">' + s.messageCount + ' 条消息 \u00b7 ' + formatTime(s.createdAt) + '</div>' +
            '<select class="session-agent" data-session="' + s.id + '" title="\u5207\u6362 Agent">' +
            AGENTS.map(a => '<option value="' + a + '"' + (a === s.agentType ? ' selected' : '') + '>' + a + '</option>').join('') +
            '</select>' +
            '<button class="session-pin" data-id="' + s.id + '" data-pinned="' + (s.pinned ? '1' : '0') + '" title="' + (s.pinned ? '\u53d6\u6d88\u4fdd\u5b58' : '\u6c38\u4e45\u4fdd\u5b58') + '">' + (s.pinned ? '\ud83d\udccc' : '\ud83d\udccd') + '</button>' +
            '</div>';
        }).join('');
      }).catch(e => console.warn('renderSessionList error:', e));
    }

    // Background session list refresh every 5s
    setInterval(() => {
      if (document.querySelector('.view.active#view-chat') || document.querySelector('#view-chat.active')) {
        loadSessions(true).then(() => renderSessionList());
      }
    }, 5000);

    // ==================== SIDEBAR EVENTS (delegation) ====================
    sessionList.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) {
        const item = e.target.closest('.session-item');
        if (item) switchSession(item.dataset.id);
        return;
      }
      const id = btn.dataset.id;
      if (btn.classList.contains('session-del')) {
        deleteSession(id, btn);
      } else if (btn.classList.contains('session-pin')) {
        togglePin(id, btn);
      }
    });

    sessionList.addEventListener('change', (e) => {
      if (e.target.classList.contains('session-agent')) {
        const sessionId = e.target.dataset.session;
        const agent = e.target.value;
        apiPost('/sessions/' + sessionId + '/switch-agent', { agentType: agent }).then(() => {
          renderSessionList();
          toast('已切换至 ' + agent);
        }).catch(errToast);
      }
    });

    // ==================== SESSION OPERATIONS ====================
    async function deleteSession(id, btn) {
      const name = btn.closest('.session-item')?.querySelector('.session-name')?.textContent || id.slice(0, 8);
      toastWithUndo('会话 ' + name + ' 已关闭', async () => {
        toast('已撤销关闭');
        renderSessionList();
      });
      try {
        await apiDelete('/sessions/' + id);
        if (id === state.currentSessionId) {
          state.currentSessionId = null;
          localStorage.removeItem('sessionId');
          chat.innerHTML = '';
        }
        renderSessionList();
        if (!state.currentSessionId) {
          const sessions = await loadSessions(true);
          if (sessions.length > 0) switchSession(sessions[0].id);
          else createNewSession();
        }
      } catch (e) {
        hideToast();
        errToast(e);
      }
    }

    async function togglePin(id, btn) {
      const pinned = btn.dataset.pinned === '1';
      try {
        await (pinned ? apiPost('/sessions/' + id + '/unpin') : apiPost('/sessions/' + id + '/pin'));
        renderSessionList();
        toast(pinned ? '已取消保存' : '已永久保存');
        btn.dataset.pinned = pinned ? '0' : '1';
      } catch (e) {
        errToast(e);
      }
    }

    async function switchSession(sessionId) {
      state.currentSessionId = sessionId;
      localStorage.setItem('sessionId', sessionId);
      saveInputDraft();
      renderSessionList();
      reconnectSSE();
      await loadMessages(sessionId);
      restoreInputDraft();
    }

    async function createNewSession() {
      try {
        const data = await apiPost('/sessions', { userId: USER_ID });
        state.currentSessionId = data.id;
        localStorage.setItem('sessionId', data.id);
        chat.innerHTML = '';
        addMessage('system', '新会话已创建，开始对话吧');
        renderSessionList();
        reconnectSSE();
        toast('新会话已创建');
        input.value = '';
      } catch (e) {
        errToast(e);
      }
    }

    async function loadMessages(sessionId) {
      try {
        const data = await apiGet('/sessions/' + sessionId);
        chat.innerHTML = '';
        if (data.messages && data.messages.length > 0) {
          for (const m of data.messages) {
            addMessage(m.role, m.content);
          }
        } else {
          addMessage('system', '新会话已创建，开始对话吧');
        }
      } catch (e) {
        chat.innerHTML = '';
        addMessage('error', '加载消息失败: ' + (e.message || e));
      }
    }

    function formatTime(dateStr) {
      const d = new Date(dateStr);
      return d.getMonth() + 1 + '/' + d.getDate() + ' ' +
        String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    // ==================== INPUT DRAFT ====================
    function saveInputDraft() {
      const prevId = localStorage.getItem('sessionId');
      if (prevId && input.value) {
        localStorage.setItem('draft_' + prevId, input.value);
      }
    }

    function restoreInputDraft() {
      const draft = localStorage.getItem('draft_' + state.currentSessionId);
      input.value = draft || '';
    }

    // Save draft on input change (debounced)
    let draftTimer = null;
    input.addEventListener('input', () => {
      clearTimeout(draftTimer);
      draftTimer = setTimeout(saveInputDraft, 1000);
    });

    // ==================== SIDEBAR TOGGLE ====================
    $('sidebarToggle').addEventListener('click', () => {
      state.sidebarOpen = !state.sidebarOpen;
      document.querySelector('.sidebar').classList.toggle('collapsed', !state.sidebarOpen);
    });

    // ==================== CHAT ====================
    function addMessage(role, content) {
      const msg = document.createElement('div');
      msg.className = 'message ' + role;
      msg.textContent = content;
      chat.appendChild(msg);
      scrollToBottom();
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chat.scrollTop = chat.scrollHeight;
      });
    }

    function isNearBottom() {
      return chat.scrollHeight - chat.scrollTop - chat.clientHeight < 100;
    }

    // Show/hide scroll-to-bottom button
    chat.addEventListener('scroll', () => {
      if (isNearBottom()) {
        scrollBtn.classList.remove('visible');
      } else {
        scrollBtn.classList.add('visible');
      }
    });

    scrollBtn.addEventListener('click', scrollToBottom);

    // ==================== TYPING INDICATOR ====================
    function showTyping(statusText) {
      let typing = $('typing');
      if (!typing) {
        typing = document.createElement('div');
        typing.className = 'typing';
        typing.id = 'typing';
        typing.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div><span class="typing-status" id="typingStatus"></span>';
        chat.appendChild(typing);
      }
      const statusEl = $('typingStatus');
      if (statusEl && statusText) statusEl.textContent = statusText;
      scrollToBottom();
    }

    function removeTyping() {
      const typing = $('typing');
      if (typing) typing.remove();
      cancelBtn.style.display = 'none';
    }

    // ==================== SSE ====================
    let reconnectAttempts = 0;

    function reconnectSSE() {
      if (state.sse) { state.sse.close(); state.sse = null; }
      if (state.wsFallback) { state.wsFallback.close(); state.wsFallback = null; }
      state.useSSE = true;
      reconnectAttempts = 0;
      if (!state.currentSessionId) return;

      connectSSE();
    }

    function connectSSE() {
      if (!state.currentSessionId) return;
      state.sse = new EventSource(API + '/chat/' + state.currentSessionId + '/sse');

      state.sse.onmessage = (event) => {
        reconnectAttempts = 0;
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'thinking') {
            showTyping('正在思考...');
            cancelBtn.style.display = '';
          } else if (data.type === 'tool_executing') {
            showTyping('正在执行: ' + (data.toolName || '工具'));
            cancelBtn.style.display = '';
          } else if (data.type === 'stream_chunk') {
            const lastMsg = chat.querySelector('.message.assistant:last-child');
            if (lastMsg) {
              lastMsg.textContent += data.content;
              if (isNearBottom()) scrollToBottom();
            }
          } else if (data.type === 'response') {
            removeTyping();
            addMessage('assistant', data.content);
            renderSessionList();
          } else if (data.type === 'error') {
            removeTyping();
            addMessage('system', '错误: ' + data.content);
          }
        } catch (e) {
          console.warn('SSE parse error:', e, event.data);
        }
        updateConnStatus();
      };

      state.sse.onerror = () => {
        state.sse.close();
        state.sse = null;
        state.useSSE = false;
        updateConnStatus();
        // Exponential backoff
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
        reconnectAttempts++;
        console.log('SSE reconnecting in ' + delay + 'ms (attempt ' + reconnectAttempts + ')');
        setTimeout(connectWS, delay);
      };

      state.sse.onopen = () => {
        reconnectAttempts = 0;
        updateConnStatus();
      };
    }

    function connectWS() {
      if (!state.currentSessionId) return;
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      state.wsFallback = new WebSocket(protocol + '//' + location.host + '/ws?sessionId=' + state.currentSessionId);

      state.wsFallback.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'response') {
            removeTyping();
            addMessage('assistant', data.content);
          }
        } catch (e) {}
        updateConnStatus();
      };

      state.wsFallback.onopen = () => {
        reconnectAttempts = 0;
        updateConnStatus();
      };

      state.wsFallback.onclose = () => {
        updateConnStatus();
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
        reconnectAttempts++;
        setTimeout(connectWS, delay);
      };
    }

    // ==================== SEND ====================
    async function send() {
      const message = input.value.trim();
      if (!message || !state.currentSessionId || state.sending) return;

      state.sending = true;
      sendBtn.disabled = true;
      sendBtn.classList.add('loading');
      sendBtn.textContent = '⏳';

      addMessage('user', message);
      input.value = '';
      showTyping();
      saveInputDraft();

      if (state.useSSE) {
        try {
          const res = await fetch(API + '/chat/' + state.currentSessionId, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, userId: USER_ID })
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
        } catch (err) {
          addMessage('system', '发送失败: ' + (err.message || '网络错误'));
          removeTyping();
        }
      } else if (state.wsFallback && state.wsFallback.readyState === WebSocket.OPEN) {
        try {
          state.wsFallback.send(JSON.stringify({ sessionId: state.currentSessionId, message, userId: USER_ID }));
        } catch (err) {
          addMessage('system', '发送失败: ' + (err.message || '网络错误'));
          removeTyping();
        }
      } else {
        addMessage('system', '未连接，无法发送');
        removeTyping();
      }

      state.sending = false;
      sendBtn.disabled = false;
      sendBtn.classList.remove('loading');
      sendBtn.textContent = '发送';
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // ==================== CANCEL ====================
    cancelBtn.addEventListener('click', async () => {
      if (!state.currentSessionId) return;
      try {
        await fetch(API + '/chat/' + state.currentSessionId + '/cancel', { method: 'POST' });
      } catch (e) {}
      removeTyping();
      addMessage('system', '已取消');
      state.sending = false;
      sendBtn.disabled = false;
      sendBtn.classList.remove('loading');
      sendBtn.textContent = '发送';
    });

    // ==================== INIT ====================
    function initChat() {
      loadSessions().then(sessions => {
        if (!state.currentSessionId || !sessions.find(s => s.id === state.currentSessionId)) {
          if (sessions.length > 0) {
            switchSession(sessions[0].id);
          } else {
            createNewSession();
          }
        } else {
          renderSessionList();
          loadMessages(state.currentSessionId);
          reconnectSSE();
          restoreInputDraft();
        }
      }).catch(e => {
        console.error('initChat failed:', e);
      });
    }

    document.getElementById('newSessionBtn').addEventListener('click', createNewSession);

    initChat();

    // ==================== WELCOME PAGE ====================
    document.getElementById('wc-save').addEventListener('click', async () => {
      const openaiKey = document.getElementById('wc-openai-key').value.trim();
      const anthropicKey = document.getElementById('wc-anthropic-key').value.trim();
      const agent = document.getElementById('wc-default-agent').value;

      const updates = {};
      if (openaiKey) updates['openai_api_key'] = openaiKey;
      if (anthropicKey) updates['anthropic_api_key'] = anthropicKey;
      updates['default_agent'] = agent;

      try {
        if (Object.keys(updates).length > 0) {
          await apiPost('/config/batch', updates);
          await apiPost('/config/reload');
        }
        localStorage.setItem('vibe_agent_visited', '1');
        toast('配置已保存！');
        showView('chat');
      } catch (e) {
        errToast(e);
      }
    });

    document.getElementById('wc-skip').addEventListener('click', () => {
      localStorage.setItem('vibe_agent_visited', '1');
      showView('chat');
    });

    // ==================== CONFIG ====================
    const CONFIG_CATEGORIES = {
      ai: 'AI 服务配置',
      agent: 'Agent 设置',
      channel: '通道配置',
      system: '系统配置'
    };

    let configEntries = [];

    async function loadConfig() {
      try {
        const data = await apiGet('/config');
        configEntries = data.entries || [];
        renderConfigForm();
      } catch (e) {
        errToast(e);
      }
    }

    function renderConfigForm() {
      const container = document.getElementById('config-form');
      const byCategory = {};
      for (const entry of configEntries) {
        if (!byCategory[entry.category]) byCategory[entry.category] = [];
        byCategory[entry.category].push(entry);
      }

      let html = '';
      for (const [cat, label] of Object.entries(CONFIG_CATEGORIES)) {
        const items = byCategory[cat];
        if (!items || items.length === 0) continue;
        html += '<div class="config-section"><h3>' + label + '</h3>';
        for (const item of items) {
          const isPassword = item.encrypted;
          const needsRestart = item.key === 'port' || item.key === 'host' || item.key === 'redis_url';
          html += '<div class="config-row">' +
            '<div><label>' + item.key + '</label>' +
            '<div class="desc">' + (item.description || '') + (needsRestart ? '<span class="restart-tag">需重启</span>' : '') + '</div></div>' +
            '<div style="flex:1;display:flex;align-items:center;gap:0.5rem;">' +
            '<input type="' + (isPassword ? 'password' : 'text') + '" id="cfg-' + item.key + '" value="' + escapeHtml(item.value || '') + '" data-key="' + item.key + '" data-encrypted="' + item.encrypted + '">' +
            (isPassword ? '<button class="toggle-vis" onclick="toggleVisibility(\'cfg-' + item.key + '\')">👁</button>' : '') +
            '</div></div>';
        }
        if (cat === 'channel') {
          html += renderFeishuSection();
        }
        html += '</div>';
      }
      container.innerHTML = html;
      loadFeishuStatus();
    }

    function renderFeishuSection() {
      return '<div style="margin-top:1.5rem;padding:1rem;background:#1a1a2e;border-radius:0.5rem;border:1px solid #0f3460;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">' +
        '<h4 style="color:#00d9ff;font-size:0.95rem;">飞书机器人连接</h4>' +
        '<span id="feishu-status-badge" style="font-size:0.8rem;padding:0.2rem 0.5rem;border-radius:0.3rem;background:#4a1a1a;color:#ff6b6b;">未连接</span></div>' +

        '<div style="margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #0f3460;">' +
        '<p style="font-size:0.8rem;color:#00d9ff;margin-bottom:0.5rem;font-weight:600;">方式一：扫码创建机器人（推荐）</p>' +
        '<div style="display:flex;gap:1.5rem;align-items:flex-start;">' +
        '<div style="flex-shrink:0;">' +
        '<div id="feishu-register-qr" style="width:160px;height:160px;background:#16213e;border-radius:0.5rem;display:flex;align-items:center;justify-content:center;color:#666;font-size:0.8rem;overflow:hidden;">点击下方按钮生成二维码</div>' +
        '<div id="feishu-register-status" style="text-align:center;margin-top:0.5rem;font-size:0.75rem;color:#888;"></div></div>' +
        '<div style="flex:1;"><p style="font-size:0.85rem;color:#aaa;margin-bottom:0.75rem;line-height:1.5;">' +
        '1. 点击「扫码创建机器人」<br>' +
        '2. 用飞书 App 扫码 → 点「授权同意」<br>' +
        '3. 系统自动获取 App ID / App Secret<br>' +
        '4. 点击「测试连接」验证</p>' +
        '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;">' +
        '<button class="btn-primary" onclick="handleFeishuRegister()" style="padding:0.4rem 0.8rem;font-size:0.85rem;width:auto;">扫码创建机器人</button>' +
        '<button class="btn-secondary" onclick="handleFeishuTest()" style="padding:0.4rem 0.8rem;font-size:0.85rem;width:auto;">测试连接</button></div>' +
        '<div id="feishu-test-result" style="margin-top:0.5rem;font-size:0.8rem;color:#aaa;"></div></div></div></div>' +

        '<div><p style="font-size:0.8rem;color:#888;margin-bottom:0.5rem;">方式二：手动配置（已有应用）</p>' +
        '<div id="feishu-manual-hint" style="font-size:0.8rem;color:#666;">在上方填写 feishu_app_id、feishu_app_secret、feishu_verification_token</div></div></div>';
    }

    let feishuSse = null;

    async function handleFeishuRegister() {
      if (feishuSse) { feishuSse.close(); feishuSse = null; }
      const qrContainer = document.getElementById('feishu-register-qr');
      const statusDiv = document.getElementById('feishu-register-status');
      qrContainer.innerHTML = '<div style="color:#666;">初始化中...</div>';
      statusDiv.textContent = '';

      try {
        const data = await apiPost('/feishu/register/init', {});
        if (!data.success) {
          qrContainer.innerHTML = '<div style="color:#ff6b6b;font-size:0.75rem;padding:0.5rem;">' + (data.message || '初始化失败') + '</div>';
          return;
        }

        const qrUrl = data.qrUrl;
        try {
          const QRCode = await import('https://cdn.skypack.dev/qrcode');
          const svg = await QRCode.toString(qrUrl, { type: 'svg', width: 160, margin: 1, color: { dark: '#00d9ff', light: '#16213e' } });
          qrContainer.innerHTML = svg;
        } catch {
          qrContainer.innerHTML = '<div style="padding:0.5rem;font-size:0.7rem;word-break:break-all;color:#00d9ff;">' + qrUrl + '</div>';
        }

        statusDiv.textContent = '等待扫码...';
        statusDiv.style.color = '#00d9ff';

        const deviceCode = data.deviceCode;
        feishuSse = new EventSource(API + '/feishu/register/' + encodeURIComponent(deviceCode) + '/sse');
        feishuSse.onmessage = async (event) => {
          try {
            const reg = JSON.parse(event.data);
            if (reg.done) { feishuSse.close(); feishuSse = null; return; }
            if (reg.status === 'success') {
              feishuSse.close(); feishuSse = null;
              const appIdInput = document.getElementById('cfg-feishu_app_id');
              const appSecretInput = document.getElementById('cfg-feishu_app_secret');
              if (appIdInput) appIdInput.value = reg.appId || '';
              if (appSecretInput) appSecretInput.value = reg.appSecret || '';
              await apiPost('/config/batch', { feishu_app_id: reg.appId || '', feishu_app_secret: reg.appSecret || '' });
              await apiPost('/config/reload');
              qrContainer.innerHTML = '<div style="color:#00d9ff;font-size:2rem;">✓</div>';
              statusDiv.textContent = '创建成功！凭证已自动填充';
              statusDiv.style.color = '#00d9ff';
              toast('飞书机器人创建成功！');
              updateFeishuBadge(true);
            } else if (reg.status === 'denied') {
              feishuSse.close(); feishuSse = null;
              statusDiv.textContent = '用户拒绝授权';
              statusDiv.style.color = '#ff6b6b';
            } else if (reg.status === 'expired') {
              feishuSse.close(); feishuSse = null;
              statusDiv.textContent = '二维码已过期';
              statusDiv.style.color = '#ff6b6b';
            } else if (reg.status === 'error') {
              feishuSse.close(); feishuSse = null;
              statusDiv.textContent = '错误: ' + (reg.error || '未知错误');
              statusDiv.style.color = '#ff6b6b';
            }
          } catch (e) {}
        };
      } catch (error) {
        qrContainer.innerHTML = '<div style="color:#ff6b6b;font-size:0.75rem;padding:0.5rem;">' + (error.message || '初始化失败') + '</div>';
      }
    }

    async function handleFeishuTest() {
      const resultDiv = document.getElementById('feishu-test-result');
      resultDiv.textContent = '测试中...';
      resultDiv.style.color = '#aaa';
      try {
        const data = await apiPost('/feishu/test', {});
        if (data.success) {
          resultDiv.textContent = '✅ ' + data.message;
          resultDiv.style.color = '#00d9ff';
          updateFeishuBadge(true);
        } else {
          resultDiv.textContent = '❌ ' + data.message;
          resultDiv.style.color = '#ff6b6b';
          updateFeishuBadge(false);
        }
      } catch (err) {
        resultDiv.textContent = '❌ 测试失败: ' + (err.message || '网络错误');
        resultDiv.style.color = '#ff6b6b';
      }
    }

    async function loadFeishuStatus() {
      try {
        const status = await apiGet('/feishu/status');
        updateFeishuBadge(status.connected);
      } catch (e) {}
    }

    function updateFeishuBadge(connected) {
      const badge = document.getElementById('feishu-status-badge');
      if (!badge) return;
      if (connected) {
        badge.textContent = '已连接';
        badge.style.background = '#1a4a1a';
        badge.style.color = '#00d9ff';
      } else {
        badge.textContent = '未连接';
        badge.style.background = '#4a1a1a';
        badge.style.color = '#ff6b6b';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    window.toggleVisibility = function(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    };

    document.getElementById('cfg-save').addEventListener('click', async () => {
      const updates = {};
      document.querySelectorAll('#config-form input[data-key]').forEach(input => {
        const key = input.dataset.key;
        const value = input.value.trim();
        updates[key] = value;
      });
      try {
        await apiPost('/config/batch', updates);
        await apiPost('/config/reload');
        toast('配置已保存并热加载！');
        loadConfig();
      } catch (e) {
        errToast(e);
      }
    });

    document.getElementById('cfg-reset').addEventListener('click', async () => {
      if (!confirm('确定要重置所有配置为默认值吗？')) return;
      try {
        await apiPost('/config/reset');
        toast('配置已重置');
        loadConfig();
      } catch (e) {
        errToast(e);
      }
    });

    const observer = new MutationObserver(() => {
      const vc = document.getElementById('view-config');
      if (vc && vc.classList.contains('active')) loadConfig();
    });
    observer.observe(document.getElementById('view-config'), { attributes: true, attributeFilter: ['class'] });
  </script>
</body>
</html>
