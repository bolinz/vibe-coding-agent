<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Coding Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Header & Navigation */
    .header {
      background: #16213e;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 1.2rem;
      color: #00d9ff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-buttons {
      display: flex;
      gap: 0.5rem;
    }
    .nav-btn {
      background: transparent;
      border: 1px solid #0f3460;
      color: #aaa;
      padding: 0.4rem 0.8rem;
      border-radius: 0.4rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .nav-btn:hover, .nav-btn.active {
      border-color: #00d9ff;
      color: #00d9ff;
      background: rgba(0, 217, 255, 0.1);
    }

    /* View container */
    .view {
      flex: 1;
      overflow-y: auto;
      display: none;
    }
    .view.active { display: flex; flex-direction: column; }

    /* ========== SESSION SIDEBAR ========== */
    .sidebar {
      width: 240px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header h3 {
      font-size: 0.85rem;
      color: #aaa;
    }
    .sidebar-header button {
      background: #00d9ff;
      border: none;
      color: #1a1a2e;
      width: 26px;
      height: 26px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-header button:hover { background: #00b8d9; }
    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .session-item {
      padding: 0.5rem 0.7rem;
      border-radius: 0.4rem;
      cursor: pointer;
      margin-bottom: 0.2rem;
      transition: all 0.15s;
      border-left: 3px solid transparent;
      position: relative;
    }
    .session-item:hover {
      background: rgba(0, 217, 255, 0.05);
    }
    .session-item.active {
      background: rgba(0, 217, 255, 0.1);
      border-left-color: #00d9ff;
    }
    .session-item .session-name {
      font-size: 0.8rem;
      color: #eee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 18px;
    }
    .session-item .session-meta {
      font-size: 0.65rem;
      color: #666;
      margin-top: 0.1rem;
    }
    .session-item .session-del {
      position: absolute;
      top: 0.3rem;
      right: 0.3rem;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.1rem 0.3rem;
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: 3px;
    }
    .session-item:hover .session-del { opacity: 1; }
    .session-item .session-del:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ========== WELCOME PAGE ========== */
    .welcome-page {
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .welcome-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 1rem;
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .welcome-card .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .welcome-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #00d9ff;
    }
    .welcome-card p.desc {
      color: #aaa;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .welcome-card .features {
      text-align: left;
      background: #1a1a2e;
      border-radius: 0.5rem;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      color: #ccc;
    }
    .welcome-card .features li {
      margin: 0.4rem 0;
      list-style: none;
    }
    .welcome-card .features li::before {
      content: "\2713 ";
      color: #00d9ff;
    }

    .quick-config {
      text-align: left;
      margin-bottom: 1.5rem;
    }
    .quick-config label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.25rem;
      margin-top: 0.75rem;
    }
    .quick-config input, .quick-config select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 0.4rem;
      color: #eee;
      font-size: 0.95rem;
    }
    .quick-config input:focus, .quick-config select:focus {
      outline: none;
      border-color: #00d9ff;
    }

    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #00b8d9; }
    .btn-secondary {
      width: 100%;
      padding: 0.6rem;
      background: transparent;
      color: #aaa;
      border: 1px solid #0f3460;
      border-radius: 0.5rem;
      margin-top: 0.75rem;
      cursor: pointer;
    }
    .btn-secondary:hover { color: #eee; border-color: #666; }

    /* ========== CHAT ========== */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      background: #0f3460;
      align-self: flex-end;
      border-bottom-right-radius: 0.25rem;
    }
    .message.assistant {
      background: #16213e;
      align-self: flex-start;
      border-bottom-left-radius: 0.25rem;
    }
    .message.system {
      background: transparent;
      color: #666;
      font-size: 0.85rem;
      align-self: center;
      text-align: center;
    }
    .message.error {
      background: #4a1a1a;
      color: #ff6b6b;
      align-self: flex-start;
    }
    .typing {
      display: flex;
      gap: 0.25rem;
      padding: 0.75rem 1rem;
      background: #16213e;
      align-self: flex-start;
      border-radius: 0.75rem;
      border-bottom-left-radius: 0.25rem;
    }
    .typing span {
      width: 8px; height: 8px;
      background: #00d9ff;
      border-radius: 50%;
      animation: typing 1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-4px); }
    }
    .input-area {
      padding: 1rem;
      background: #16213e;
      border-top: 1px solid #0f3460;
    }
    .input-container {
      display: flex;
      gap: 0.5rem;
      max-width: 800px;
      margin: 0 auto;
    }
    .input-container input {
      flex: 1;
      padding: 0.75rem 1rem;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 0.5rem;
      color: #eee;
      font-size: 1rem;
    }
    .input-container input:focus {
      outline: none;
      border-color: #00d9ff;
    }
    .input-container button {
      padding: 0.75rem 1.5rem;
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
    }
    .input-container button:hover { background: #00b8d9; }
    .input-container button:disabled { background: #555; cursor: not-allowed; }

    /* ========== CONFIG PAGE ========== */
    .config-page {
      padding: 1.5rem 2rem;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }
    .config-section {
      margin-bottom: 2rem;
    }
    .config-section h3 {
      font-size: 1rem;
      color: #00d9ff;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #0f3460;
    }
    .config-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      padding: 0.5rem 0;
    }
    .config-row label {
      width: 160px;
      font-size: 0.9rem;
      color: #ccc;
      flex-shrink: 0;
    }
    .config-row .desc {
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.15rem;
    }
    .config-row input, .config-row select {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 0.4rem;
      color: #eee;
      font-size: 0.9rem;
    }
    .config-row input:focus, .config-row select:focus {
      outline: none;
      border-color: #00d9ff;
    }
    .config-row input[type="password"] {
      font-family: monospace;
    }
    .config-row .toggle-vis {
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.25rem;
    }
    .config-row .toggle-vis:hover { color: #00d9ff; }
    .config-row .restart-tag {
      font-size: 0.7rem;
      color: #ff9f43;
      background: rgba(255, 159, 67, 0.15);
      padding: 0.1rem 0.4rem;
      border-radius: 0.2rem;
      margin-left: 0.5rem;
    }
    .config-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #0f3460;
    }
    .config-actions button {
      padding: 0.6rem 1.2rem;
      border-radius: 0.4rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-save { background: #00d9ff; color: #1a1a2e; }
    .btn-save:hover { background: #00b8d9; }
    .btn-reset { background: transparent; color: #aaa; border: 1px solid #0f3460; }
    .btn-reset:hover { border-color: #ff6b6b; color: #ff6b6b; }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #16213e;
      border: 1px solid #00d9ff;
      color: #00d9ff;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>🤖</span> AI Coding Agent</h1>
    <div class="nav-buttons">
      <button class="nav-btn" data-view="welcome" title="欢迎">❓</button>
      <button class="nav-btn active" data-view="chat" title="聊天">💬</button>
      <button class="nav-btn" data-view="config" title="设置">⚙️</button>
    </div>
  </div>

  <div class="view welcome-page" id="view-welcome">
    <div class="welcome-card">
      <div class="icon">🤖</div>
      <h2>AI Coding Agent</h2>
      <p class="desc">基于 TypeScript/Bun 的多渠道 AI Agent 共享会话框架</p>
      <ul class="features">
        <li>飞书 Bot 实时接入</li>
        <li>Web 实时聊天界面 (SSE + WebSocket)</li>
        <li>SSH 终端接入</li>
        <li>多 Agent 可插拔 (Hermes / Claude / Aider / Echo)</li>
        <li>工具链调用 (Shell / Git / File)</li>
        <li>会话管理 (创建/切换/关闭)</li>
      </ul>
      <div class="quick-config">
        <label>OpenAI API Key</label>
        <input type="password" id="wc-openai-key" placeholder="sk-...">
        <label>Anthropic API Key</label>
        <input type="password" id="wc-anthropic-key" placeholder="sk-...">
        <label>默认 Agent</label>
        <select id="wc-default-agent">
          <option value="echo">Echo（测试模式）</option>
          <option value="hermes">Hermes（本地推理）</option>
          <option value="claude">Claude（Anthropic）</option>
          <option value="aider">Aider（编码助手）</option>
        </select>
      </div>
      <button class="btn-primary" id="wc-save">保存并开始使用</button>
      <button class="btn-secondary" id="wc-skip">跳过配置，使用 Echo 测试模式</button>
    </div>
  </div>

  <div class="view chat-page active" id="view-chat">
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-header">
          <h3>📋 会话</h3>
          <button id="newSessionBtn" title="新建会话">+</button>
        </div>
        <div class="session-list" id="sessionList"></div>
      </div>
      <div class="chat-area">
        <div class="chat-container" id="chat"></div>
        <div class="input-area">
          <div class="input-container">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="view config-page" id="view-config">
    <div id="config-form"></div>
    <div class="config-actions">
      <button class="btn-save" id="cfg-save">💾 保存配置</button>
      <button class="btn-reset" id="cfg-reset">🔄 重置为默认</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ==================== ROUTING ====================
    function showView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('view-' + name).classList.add('active');
      document.querySelector('.nav-btn[data-view="' + name + '"]').classList.add('active');
      location.hash = '#/' + name;
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => showView(btn.dataset.view));
    });

    if (!localStorage.getItem('vibe_agent_visited')) {
      showView('welcome');
    } else {
      const hash = location.hash.replace('#/', '') || 'chat';
      showView(hash === 'welcome' ? 'welcome' : hash === 'config' ? 'config' : 'chat');
    }

    // ==================== TOAST ====================
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ==================== API ====================
    async function apiGet(path) {
      const res = await fetch('/api' + path);
      return res.json();
    }
    async function apiPost(path, body) {
      const res = await fetch('/api' + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      return res.json();
    }
    async function apiDelete(path) {
      const res = await fetch('/api' + path, { method: 'DELETE' });
      return res.json();
    }

    // ==================== SESSION MANAGEMENT ====================
    const USER_ID = localStorage.getItem('userId') ||
      (crypto.randomUUID ? crypto.randomUUID() : 'user_' + Math.random().toString(36).substring(2, 8));
    localStorage.setItem('userId', USER_ID);

    let currentSessionId = localStorage.getItem('sessionId') || null;

    async function loadSessions() {
      const data = await apiGet('/sessions?userId=' + encodeURIComponent(USER_ID));
      return data.sessions || [];
    }

    async function initChat() {
      const sessions = await loadSessions();
      if (!currentSessionId || !sessions.find(s => s.id === currentSessionId)) {
        if (sessions.length > 0) {
          await switchSession(sessions[0].id);
        } else {
          await createNewSession();
        }
      } else {
        renderSessionList();
        await loadMessages(currentSessionId);
        reconnectSSE();
      }
    }

    function renderSessionList() {
      const list = document.getElementById('sessionList');
      if (!list) return;
      loadSessions().then(sessions => {
        list.innerHTML = sessions.map(s => {
          const active = s.id === currentSessionId ? 'active' : '';
          const name = s.agentType + ' ' + s.id.slice(0, 8);
          return '<div class="session-item ' + active + '" data-id="' + s.id + '">' +
            '<button class="session-del" data-id="' + s.id + '" title="关闭会话">\u00d7</button>' +
            '<div class="session-name">' + name + '</div>' +
            '<div class="session-meta">' + s.messageCount + ' \u6761\u6d88\u606f \u00b7 ' + formatTime(s.createdAt) + '</div>' +
            '</div>';
        }).join('');

        list.querySelectorAll('.session-item').forEach(el => {
          el.addEventListener('click', (e) => {
            if (e.target.classList.contains('session-del')) return;
            switchSession(el.dataset.id);
          });
        });
        list.querySelectorAll('.session-del').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            if (!confirm('\u786e\u5b9a\u5173\u95ed\u6b64\u4f1a\u8bdd\uff1f')) return;
            await apiDelete('/sessions/' + id);
            if (id === currentSessionId) {
              currentSessionId = null;
              document.getElementById('chat').innerHTML = '';
            }
            renderSessionList();
            if (!currentSessionId) {
              const s = await loadSessions();
              if (s.length > 0) await switchSession(s[0].id);
              else await createNewSession();
            }
          });
        });
      });
    }

    async function switchSession(sessionId) {
      currentSessionId = sessionId;
      localStorage.setItem('sessionId', sessionId);
      renderSessionList();
      reconnectSSE();
      await loadMessages(sessionId);
    }

    async function createNewSession() {
      const data = await apiPost('/sessions', { userId: USER_ID });
      currentSessionId = data.id;
      localStorage.setItem('sessionId', data.id);
      document.getElementById('chat').innerHTML = '';
      addMessage('system', '\u65b0\u4f1a\u8bdd\u5df2\u521b\u5efa');
      renderSessionList();
      reconnectSSE();
      toast('\u65b0\u4f1a\u8bdd\u5df2\u521b\u5efa');
    }

    async function loadMessages(sessionId) {
      const data = await apiGet('/sessions/' + sessionId);
      const chat = document.getElementById('chat');
      chat.innerHTML = '';
      if (data.messages && data.messages.length > 0) {
        for (const m of data.messages) {
          addMessage(m.role, m.content);
        }
      } else {
        addMessage('system', '\u65b0\u4f1a\u8bdd\u5df2\u521b\u5efa\uff0c\u5f00\u59cb\u5bf9\u8bdd\u5427');
      }
    }

    function formatTime(dateStr) {
      const d = new Date(dateStr);
      return d.getMonth() + 1 + '/' + d.getDate() + ' ' +
        String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    document.getElementById('newSessionBtn').addEventListener('click', createNewSession);

    // ==================== CHAT ====================
    const chat = document.getElementById('chat');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    let sse = null;
    let wsFallback = null;
    let useSSE = true;
    let refreshingList = false;

    function reconnectSSE() {
      if (sse) { sse.close(); sse = null; }
      if (wsFallback) { wsFallback.close(); wsFallback = null; }
      useSSE = true;
      if (!currentSessionId) return;

      sse = new EventSource('/api/chat/' + currentSessionId + '/sse');
      sse.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'response') {
            removeTyping();
            addMessage('assistant', data.content);
            if (!refreshingList) {
              refreshingList = true;
              setTimeout(() => { renderSessionList(); refreshingList = false; }, 500);
            }
          } else if (data.type === 'error') {
            removeTyping();
            addMessage('system', '\u9519\u8bef: ' + data.content);
          }
        } catch (e) {}
      };
      sse.onerror = () => {
        sse.close();
        sse = null;
        useSSE = false;
        connectWS();
      };
    }

    function connectWS() {
      if (!currentSessionId) return;
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      wsFallback = new WebSocket(protocol + '//' + location.host + '/ws?sessionId=' + currentSessionId);
      wsFallback.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'response') {
          removeTyping();
          addMessage('assistant', data.content);
        }
      };
      wsFallback.onclose = () => { setTimeout(connectWS, 3000); };
    }

    function addMessage(role, content) {
      const msg = document.createElement('div');
      msg.className = 'message ' + role;
      msg.textContent = content;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }
    function showTyping() {
      if (document.getElementById('typing')) return;
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;
    }
    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function send() {
      const message = input.value.trim();
      if (!message || !currentSessionId) return;
      addMessage('user', message);
      input.value = '';
      showTyping();

      if (useSSE) {
        try {
          await fetch('/api/chat/' + currentSessionId, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, userId: USER_ID })
          });
        } catch (err) {
          addMessage('system', '\u53d1\u9001\u5931\u8d25: ' + (err.message || '\u7f51\u7edc\u9519\u8bef'));
          removeTyping();
        }
      } else if (wsFallback && wsFallback.readyState === WebSocket.OPEN) {
        wsFallback.send(JSON.stringify({ sessionId: currentSessionId, message, userId: USER_ID }));
      } else {
        addMessage('system', '\u672a\u8fde\u63a5\uff0c\u65e0\u6cd5\u53d1\u9001');
        removeTyping();
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });

    // Init
    initChat();

    // ==================== WELCOME ====================
    document.getElementById('wc-save').addEventListener('click', async () => {
      const openaiKey = document.getElementById('wc-openai-key').value.trim();
      const anthropicKey = document.getElementById('wc-anthropic-key').value.trim();
      const agent = document.getElementById('wc-default-agent').value;

      const updates = {};
      if (openaiKey) updates['openai_api_key'] = openaiKey;
      if (anthropicKey) updates['anthropic_api_key'] = anthropicKey;
      updates['default_agent'] = agent;

      if (Object.keys(updates).length > 0) {
        await apiPost('/config/batch', updates);
        await apiPost('/config/reload');
      }

      localStorage.setItem('vibe_agent_visited', '1');
      toast('\u914d\u7f6e\u5df2\u4fdd\u5b58\uff01');
      showView('chat');
    });

    document.getElementById('wc-skip').addEventListener('click', () => {
      localStorage.setItem('vibe_agent_visited', '1');
      showView('chat');
    });

    // ==================== CONFIG ====================
    const CONFIG_CATEGORIES = {
      ai: 'AI \u670d\u52a1\u914d\u7f6e',
      agent: 'Agent \u8bbe\u7f6e',
      channel: '\u6e20\u9053\u914d\u7f6e',
      system: '\u7cfb\u7edf\u914d\u7f6e'
    };

    let configEntries = [];

    async function loadConfig() {
      const data = await apiGet('/config');
      configEntries = data.entries || [];
      renderConfigForm();
    }

    function renderConfigForm() {
      const container = document.getElementById('config-form');
      const byCategory = {};
      for (const entry of configEntries) {
        if (!byCategory[entry.category]) byCategory[entry.category] = [];
        byCategory[entry.category].push(entry);
      }

      let html = '';
      for (const [cat, label] of Object.entries(CONFIG_CATEGORIES)) {
        const items = byCategory[cat];
        if (!items || items.length === 0) continue;
        html += '<div class="config-section"><h3>' + label + '</h3>';
        for (const item of items) {
          const isPassword = item.encrypted;
          const needsRestart = item.key === 'port' || item.key === 'host' || item.key === 'redis_url';
          html += '<div class="config-row">' +
            '<div><label>' + item.key + '</label>' +
            '<div class="desc">' + (item.description || '') + (needsRestart ? '<span class="restart-tag">\u9700\u91cd\u542f</span>' : '') + '</div></div>' +
            '<div style="flex:1;display:flex;align-items:center;gap:0.5rem;">' +
            '<input type="' + (isPassword ? 'password' : 'text') + '" id="cfg-' + item.key + '" value="' + escapeHtml(item.value || '') + '" data-key="' + item.key + '" data-encrypted="' + item.encrypted + '">' +
            (isPassword ? '<button class="toggle-vis" onclick="toggleVisibility(\'cfg-' + item.key + '\')">\uD83D\uDC41</button>' : '') +
            '</div></div>';
        }
        if (cat === 'channel') {
          html += renderFeishuSection();
        }
        html += '</div>';
      }
      container.innerHTML = html;
      loadFeishuStatus();
    }

    function renderFeishuSection() {
      return '<div style="margin-top:1.5rem;padding:1rem;background:#1a1a2e;border-radius:0.5rem;border:1px solid #0f3460;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">' +
        '<h4 style="color:#00d9ff;font-size:0.95rem;">\u98de\u4e66\u673a\u5668\u4eba\u8fde\u63a5</h4>' +
        '<span id="feishu-status-badge" style="font-size:0.8rem;padding:0.2rem 0.5rem;border-radius:0.3rem;background:#4a1a1a;color:#ff6b6b;">\u672a\u8fde\u63a5</span></div>' +

        '<div style="margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #0f3460;">' +
        '<p style="font-size:0.8rem;color:#00d9ff;margin-bottom:0.5rem;font-weight:600;">\u65b9\u5f0f\u4e00\uff1a\u626b\u7801\u521b\u5efa\u673a\u5668\u4eba\uff08\u63a8\u8350\uff09</p>' +
        '<div style="display:flex;gap:1.5rem;align-items:flex-start;">' +
        '<div style="flex-shrink:0;">' +
        '<div id="feishu-register-qr" style="width:160px;height:160px;background:#16213e;border-radius:0.5rem;display:flex;align-items:center;justify-content:center;color:#666;font-size:0.8rem;overflow:hidden;">\u70b9\u51fb\u4e0b\u65b9\u6309\u94ae\u751f\u6210\u4e8c\u7ef4\u7801</div>' +
        '<div id="feishu-register-status" style="text-align:center;margin-top:0.5rem;font-size:0.75rem;color:#888;"></div></div>' +
        '<div style="flex:1;"><p style="font-size:0.85rem;color:#aaa;margin-bottom:0.75rem;line-height:1.5;">' +
        '1. \u70b9\u51fb\u300c\u626b\u7801\u521b\u5efa\u673a\u5668\u4eba\u300d<br>' +
        '2. \u7528\u98de\u4e66 App \u626b\u7801 \u2192 \u70b9\u300c\u6388\u6743\u540c\u610f\u300d<br>' +
        '3. \u7cfb\u7edf\u81ea\u52a8\u83b7\u53d6 App ID / App Secret<br>' +
        '4. \u70b9\u51fb\u300c\u6d4b\u8bd5\u8fde\u63a5\u300d\u9a8c\u8bc1</p>' +
        '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;">' +
        '<button class="btn-primary" onclick="handleFeishuRegister()" style="padding:0.4rem 0.8rem;font-size:0.85rem;width:auto;">\u626b\u7801\u521b\u5efa\u673a\u5668\u4eba</button>' +
        '<button class="btn-secondary" onclick="handleFeishuTest()" style="padding:0.4rem 0.8rem;font-size:0.85rem;width:auto;">\u6d4b\u8bd5\u8fde\u63a5</button></div>' +
        '<div id="feishu-test-result" style="margin-top:0.5rem;font-size:0.8rem;color:#aaa;"></div></div></div></div>' +

        '<div><p style="font-size:0.8rem;color:#888;margin-bottom:0.5rem;">\u65b9\u5f0f\u4e8c\uff1a\u624b\u52a8\u914d\u7f6e\uff08\u5df2\u6709\u5e94\u7528\uff09</p>' +
        '<div id="feishu-manual-hint" style="font-size:0.8rem;color:#666;">\u5728\u4e0a\u65b9\u586b\u5199 feishu_app_id\u3001feishu_app_secret\u3001feishu_verification_token</div></div></div>';
    }

    let feishuSse = null;

    async function handleFeishuRegister() {
      if (feishuSse) { feishuSse.close(); feishuSse = null; }
      const qrContainer = document.getElementById('feishu-register-qr');
      const statusDiv = document.getElementById('feishu-register-status');
      qrContainer.innerHTML = '<div style="color:#666;">\u521d\u59cb\u5316\u4e2d...</div>';
      statusDiv.textContent = '';

      try {
        const data = await apiPost('/feishu/register/init', {});
        if (!data.success) {
          qrContainer.innerHTML = '<div style="color:#ff6b6b;font-size:0.75rem;padding:0.5rem;">' + (data.message || '\u521d\u59cb\u5316\u5931\u8d25') + '</div>';
          return;
        }

        const qrUrl = data.qrUrl;
        try {
          const QRCode = await import('https://cdn.skypack.dev/qrcode');
          const svg = await QRCode.toString(qrUrl, { type: 'svg', width: 160, margin: 1, color: { dark: '#00d9ff', light: '#16213e' } });
          qrContainer.innerHTML = svg;
        } catch {
          qrContainer.innerHTML = '<div style="padding:0.5rem;font-size:0.7rem;word-break:break-all;color:#00d9ff;">' + qrUrl + '</div>';
        }

        statusDiv.textContent = '\u7b49\u5f85\u626b\u7801...';
        statusDiv.style.color = '#00d9ff';

        const deviceCode = data.deviceCode;
        feishuSse = new EventSource('/api/feishu/register/' + encodeURIComponent(deviceCode) + '/sse');
        feishuSse.onmessage = async (event) => {
          try {
            const reg = JSON.parse(event.data);
            if (reg.done) { feishuSse.close(); feishuSse = null; return; }
            if (reg.status === 'success') {
              feishuSse.close(); feishuSse = null;
              const appIdInput = document.getElementById('cfg-feishu_app_id');
              const appSecretInput = document.getElementById('cfg-feishu_app_secret');
              if (appIdInput) appIdInput.value = reg.appId || '';
              if (appSecretInput) appSecretInput.value = reg.appSecret || '';
              await apiPost('/config/batch', { feishu_app_id: reg.appId || '', feishu_app_secret: reg.appSecret || '' });
              await apiPost('/config/reload');
              qrContainer.innerHTML = '<div style="color:#00d9ff;font-size:2rem;">\u2713</div>';
              statusDiv.textContent = '\u521b\u5efa\u6210\u529f\uff01\u51ed\u8bc1\u5df2\u81ea\u52a8\u586b\u5145';
              statusDiv.style.color = '#00d9ff';
              toast('\u98de\u4e66\u673a\u5668\u4eba\u521b\u5efa\u6210\u529f\uff01');
              updateFeishuBadge(true);
            } else if (reg.status === 'denied') {
              feishuSse.close(); feishuSse = null;
              statusDiv.textContent = '\u7528\u6237\u62d2\u7edd\u6388\u6743';
              statusDiv.style.color = '#ff6b6b';
            } else if (reg.status === 'expired') {
              feishuSse.close(); feishuSse = null;
              statusDiv.textContent = '\u4e8c\u7ef4\u7801\u5df2\u8fc7\u671f';
              statusDiv.style.color = '#ff6b6b';
            } else if (reg.status === 'error') {
              feishuSse.close(); feishuSse = null;
              statusDiv.textContent = '\u9519\u8bef: ' + (reg.error || '\u672a\u77e5\u9519\u8bef');
              statusDiv.style.color = '#ff6b6b';
            }
          } catch (e) {}
        };
      } catch (error) {
        qrContainer.innerHTML = '<div style="color:#ff6b6b;font-size:0.75rem;padding:0.5rem;">' + (error.message || '\u521d\u59cb\u5316\u5931\u8d25') + '</div>';
      }
    }

    async function handleFeishuTest() {
      const resultDiv = document.getElementById('feishu-test-result');
      resultDiv.textContent = '\u6d4b\u8bd5\u4e2d...';
      resultDiv.style.color = '#aaa';
      try {
        const data = await apiPost('/feishu/test', {});
        if (data.success) {
          resultDiv.textContent = '\u2705 ' + data.message;
          resultDiv.style.color = '#00d9ff';
          updateFeishuBadge(true);
        } else {
          resultDiv.textContent = '\u274c ' + data.message;
          resultDiv.style.color = '#ff6b6b';
          updateFeishuBadge(false);
        }
      } catch (err) {
        resultDiv.textContent = '\u274c \u6d4b\u8bd5\u5931\u8d25: ' + (err.message || '\u7f51\u7edc\u9519\u8bef');
        resultDiv.style.color = '#ff6b6b';
      }
    }

    async function loadFeishuStatus() {
      try {
        const status = await apiGet('/feishu/status');
        updateFeishuBadge(status.connected);
      } catch (e) {}
    }

    function updateFeishuBadge(connected) {
      const badge = document.getElementById('feishu-status-badge');
      if (!badge) return;
      if (connected) {
        badge.textContent = '\u5df2\u8fde\u63a5';
        badge.style.background = '#1a4a1a';
        badge.style.color = '#00d9ff';
      } else {
        badge.textContent = '\u672a\u8fde\u63a5';
        badge.style.background = '#4a1a1a';
        badge.style.color = '#ff6b6b';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    window.toggleVisibility = function(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    };

    document.getElementById('cfg-save').addEventListener('click', async () => {
      const updates = {};
      document.querySelectorAll('#config-form input[data-key]').forEach(input => {
        const key = input.dataset.key;
        const value = input.value.trim();
        updates[key] = value;
      });
      await apiPost('/config/batch', updates);
      await apiPost('/config/reload');
      toast('\u914d\u7f6e\u5df2\u4fdd\u5b58\u5e76\u70ed\u52a0\u8f7d\uff01');
      loadConfig();
    });

    document.getElementById('cfg-reset').addEventListener('click', async () => {
      if (!confirm('\u786e\u5b9a\u8981\u91cd\u7f6e\u6240\u6709\u914d\u7f6e\u4e3a\u9ed8\u8ba4\u503c\u5417\uff1f')) return;
      await apiPost('/config/reset');
      toast('\u914d\u7f6e\u5df2\u91cd\u7f6e');
      loadConfig();
    });

    const observer = new MutationObserver(() => {
      const vc = document.getElementById('view-config');
      if (vc && vc.classList.contains('active')) loadConfig();
    });
    observer.observe(document.getElementById('view-config'), { attributes: true, attributeFilter: ['class'] });
  </script>
</body>
</html>
