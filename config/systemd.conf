[Unit]
Description=Vibe Coding Agent
After=network.target redis.target
Wants=network-online.target

[Service]
Type=simple
User=aiuser
Group=aiuser
WorkingDirectory=/opt/vibe-coding-agent
EnvironmentFile=/opt/vibe-coding-agent/.env
ExecStart=/root/.bun/bin/bun run /opt/vibe-coding-agent/src/index.ts
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal

# Security
NoNewPrivileges=true
ProtectSystem=strict
ProtectHome=true
ReadWritePaths=/projects/sandbox /tmp
PrivateTmp=true
Environment="PATH=/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

[Install]
WantedBy=multi-user.target
